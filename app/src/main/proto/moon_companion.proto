syntax = "proto3";

package moon.companion.v1;

option java_package = "org.soulstone.mooncompanion.proto";
option java_multiple_files = true;

/*
 * Moon Companion Protocol v1
 *
 * Wire format between a Moon-Firmware Flipper (central) and the Moon
 * Companion Android app (peripheral). The Flipper initiates every RPC
 * with a MoonRequest; the phone answers with a MoonResponse carrying
 * the same request_id. MoonEvents are phone-originated pushes with no
 * matching request — used for streaming subscriptions (GPS updates,
 * phone status changes).
 *
 * All envelopes fit comfortably inside the default ATT MTU once the
 * connection negotiates ≥ 247 bytes. Larger payloads (FAP / firmware
 * binaries) travel on a side-channel L2CAP CoC — not in this schema.
 */

// ── Envelopes ──────────────────────────────────────────────────────────

message MoonRequest {
    uint32 request_id = 1;           // echoed in MoonResponse.request_id
    bytes  auth_token = 2;           // 16 bytes from pairing (MoonPair)

    oneof payload {
        // Pairing (Phase 1)
        PairRequest                pair                 = 3;

        // Tier 1 — MVP
        GetPositionRequest         get_position         = 10;
        SubscribePositionRequest   subscribe_position   = 11;
        UnsubscribePositionRequest unsubscribe_position = 12;
        GetTimeRequest             get_time             = 20;
        SendNotificationRequest    send_notification    = 30;

        // Bulk transfer side-channel (Phase 3). The RPC channel itself
        // stays on GATT notifications; these verbs are just the handshake
        // that tells the Flipper which L2CAP CoC PSM the phone is
        // listening on for a specific transfer intent.
        OpenBulkChannelRequest     open_bulk_channel    = 40;
        CloseBulkChannelRequest    close_bulk_channel   = 41;

        // Tier 2 — stubs for now, filled in later
        ListAppUpdatesRequest      list_app_updates     = 100;
        DownloadAppRequest         download_app         = 101;
        CheckFirmwareUpdateRequest check_firmware       = 110;
        HttpGetRequest             http_get             = 200;
        HttpPostRequest            http_post            = 201;
    }
}

message MoonResponse {
    uint32      request_id = 1;
    MoonStatus  status     = 2;

    oneof payload {
        PairResponse            pair              = 3;
        PositionData            position          = 10;
        TimeData                time              = 20;
        NotificationAck         notification      = 30;
        OpenBulkChannelResponse open_bulk_channel = 40;
        UpdateList              updates           = 100;
        HttpResponse            http              = 200;
        StatusAck               ack               = 255;
    }
}

// Phone-initiated push. No request_id; phone emits these on its own
// schedule (e.g. once per second for a position subscription).
message MoonEvent {
    oneof event {
        PositionData position_update = 1;
        PhoneStatus  phone_status    = 2;
    }
}

// Top-level message carried over the RPC_RX characteristic. Every
// phone→Flipper notification is a MoonPhoneMessage so the Flipper-side
// decoder only needs one entry point.
message MoonPhoneMessage {
    oneof kind {
        MoonResponse response = 1;
        MoonEvent    event    = 2;
    }
}

// ── Pairing (Phase 1a — trivial, no crypto) ────────────────────────────
//
// Phase 1a: phone accepts any Flipper that sends a PairRequest while the
// user is in its pair-mode window. Phone generates and returns a random
// 16-byte auth_token. Phase 1b will replace this with ECDH + 6-digit code.

message PairRequest {
    string flipper_name = 1;   // purely for the phone's UI
}

message PairResponse {
    bytes  auth_token = 1;     // 16 bytes; caller persists and sends in every MoonRequest
    string phone_name = 2;     // purely for the Flipper's UI
}

// ── Status codes ───────────────────────────────────────────────────────

enum MoonStatus {
    MOON_OK                  = 0;
    MOON_UNAUTHORIZED        = 1;   // auth_token missing or wrong
    MOON_UNSUPPORTED_VERSION = 2;
    MOON_UNSUPPORTED_REQUEST = 3;   // phone doesn't implement this yet
    MOON_INTERNAL_ERROR      = 4;
    MOON_NOT_AVAILABLE       = 5;   // e.g., GPS not fixed, no network
    MOON_RATE_LIMITED        = 6;
}

// ── Position ───────────────────────────────────────────────────────────

message GetPositionRequest {
    uint32 max_age_ms = 1;   // return cached fix if younger than this; 0 = any age
}

message PositionData {
    sfixed32 lat_e7        = 1;   // latitude  × 1e7
    sfixed32 lon_e7        = 2;   // longitude × 1e7
    sint32   alt_mm        = 3;   // altitude above WGS-84 ellipsoid, mm
    uint32   accuracy_mm   = 4;   // 68 %-CEP horizontal accuracy
    uint32   speed_mmps    = 5;   // speed over ground, mm/s
    uint32   heading_cdeg  = 6;   // 0 – 35999 (0.01 degree)
    uint64   timestamp_ms  = 7;   // Unix epoch ms when the fix was taken
    FixQuality fix_quality = 8;
    uint32   satellites    = 9;
    // Identifier of the upstream source that produced this fix. The paired
    // phone fills this with the first 8 bytes of its stable device ID so
    // the Flipper service can distinguish multiple sources (phone vs. a
    // future Meshtastic bridge vs. a dedicated GPS module) if we ever
    // plumb more than one. Zero-filled when the source doesn't have a
    // stable identity or doesn't care.
    bytes    source_id     = 10;  // 8 bytes, max
}

enum FixQuality {
    FIX_NONE = 0;
    FIX_2D   = 1;
    FIX_3D   = 2;
}

message SubscribePositionRequest {
    uint32 interval_ms = 1;   // push interval; phone may clamp to min 500 ms
}

message UnsubscribePositionRequest {}

// ── Time ───────────────────────────────────────────────────────────────

message GetTimeRequest {}

message TimeData {
    uint64 unix_ms          = 1;
    sint32 tz_offset_seconds = 2;  // e.g., -14400 for EDT
    string tz_name          = 3;   // IANA name, e.g. "America/New_York"
}

// ── Notifications ──────────────────────────────────────────────────────

message SendNotificationRequest {
    string   title    = 1;
    string   body     = 2;
    Priority priority = 3;
    string   tag      = 4;   // optional: phone dedupes by tag, replaces prior with same tag

    enum Priority {
        NORMAL = 0;
        HIGH   = 1;
        URGENT = 2;
    }
}

message NotificationAck {
    bool delivered = 1;
}

// ── Status ─────────────────────────────────────────────────────────────

message StatusAck {}

message PhoneStatus {
    uint32 battery_pct = 1;
    bool   charging    = 2;
    bool   has_network = 3;
}

// ── Bulk transfer side-channel (Phase 3) ───────────────────────────────
//
// The phone keeps an L2CAP CoC server socket open on a dynamically
// allocated SPSM. When the Flipper wants to move bulk data it sends an
// OpenBulkChannelRequest over GATT; the phone replies with the SPSM and
// expected byte count; the Flipper then dials a CoC connection to that
// SPSM and the bytes flow directly over the L2CAP channel rather than
// chunking through GATT notifications.
//
// BULK_ECHO_TEST is the bring-up fixture: the phone streams a
// deterministic byte pattern so the Flipper can verify the channel end
// to end without any real content source involved.

enum BulkKind {
    BULK_UNSPECIFIED        = 0;
    BULK_DOWNLOAD_FAP       = 1;   // phone → Flipper, .fap binary
    BULK_UPLOAD_FILE        = 2;   // Flipper → phone, capture/dump
    BULK_FIRMWARE_UPDATE    = 3;   // phone → Flipper, .dfu image
    BULK_ECHO_TEST          = 4;   // phone → Flipper, bring-up fixture
}

message OpenBulkChannelRequest {
    BulkKind kind = 1;
    string   name = 2;   // intent-specific id: appid, filename, etc.
}

message OpenBulkChannelResponse {
    uint32 spsm          = 1;   // L2CAP PSM for the Flipper to dial (0x80–0xFF)
    uint32 total_bytes   = 2;   // expected transfer size; 0 = unknown / streaming
    bytes  session_id    = 3;   // 8 bytes; correlates CoC activity to this open
}

message CloseBulkChannelRequest {
    bytes session_id = 1;
}

// ── Tier 2: stubs (filled in later) ────────────────────────────────────

message ListAppUpdatesRequest {
    repeated AppVersion installed = 1;
}

message AppVersion {
    string appid   = 1;
    string version = 2;
}

message UpdateList {
    repeated AvailableUpdate updates = 1;
}

message AvailableUpdate {
    string appid       = 1;
    string new_version = 2;
    string source_url  = 3;   // phone uses this to fetch via HTTP, then streams over CoC
    uint32 size_bytes  = 4;
}

message DownloadAppRequest {
    string appid     = 1;
    string source_url = 2;   // from AvailableUpdate.source_url
}

message CheckFirmwareUpdateRequest {
    string current_version = 1;
}

// ── Tier 2: HTTP proxy (stub) ──────────────────────────────────────────

message HttpGetRequest {
    string url = 1;
    repeated HttpHeader headers = 2;
}

message HttpPostRequest {
    string url = 1;
    repeated HttpHeader headers = 2;
    bytes  body = 3;
}

message HttpHeader {
    string key   = 1;
    string value = 2;
}

message HttpResponse {
    uint32 status_code = 1;
    repeated HttpHeader headers = 2;
    bytes  body = 3;
}
