syntax = "proto3";

package moon.companion.v1;

// Android side uses these to emit one Java class per message under the
// org.soulstone.mooncompanion.proto Java package; nanopb on the Flipper
// side ignores standard protoc options. Keeping them in the single
// source-of-truth proto file so the firmware and Android copies stay
// byte-identical.
option java_package = "org.soulstone.mooncompanion.proto";
option java_multiple_files = true;

/*
 * Moon Companion Protocol v1
 *
 * Wire format between a Moon-Firmware Flipper (central) and the Moon
 * Companion Android app (peripheral). The Flipper initiates every RPC
 * with a MoonRequest; the phone answers with a MoonResponse carrying
 * the same request_id. MoonEvents are phone-originated pushes with no
 * matching request — used for streaming subscriptions (GPS updates,
 * phone status changes).
 *
 * All envelopes fit inside a single GATT notification — after the BLE
 * link negotiates MTU (≥ 247 B typical) the ~244 B of usable payload
 * comfortably holds every message the proto defines today. We do not
 * currently support multi-notification reassembly; payloads that would
 * exceed a single notification must be trimmed (e.g. shorter URL, fewer
 * headers) rather than chunked. File-transfer use cases (app-store .fap
 * downloads, HTTP responses bigger than ~4 KB) are explicitly out of
 * scope until we either bring in GATT-chunked reassembly or switch to a
 * radio stack variant that supports L2CAP CoC.
 */

// ── Envelopes ──────────────────────────────────────────────────────────

message MoonRequest {
    uint32 request_id = 1;           // echoed in MoonResponse.request_id
    bytes  auth_token = 2;           // 16 bytes from pairing (MoonPair)

    oneof payload {
        // Pairing
        PairRequest                pair                 = 3;

        // Core services — available to every FAP via moon_companion C API
        GetPositionRequest         get_position         = 10;
        SubscribePositionRequest   subscribe_position   = 11;
        UnsubscribePositionRequest unsubscribe_position = 12;
        GetTimeRequest             get_time             = 20;
        SendNotificationRequest    send_notification    = 30;

        // Generic HTTP proxy. Phone terminates TLS. Any method, any URL,
        // any headers. Response body is inline in the MoonResponse and
        // is capped small enough to fit in a single GATT notification;
        // larger payloads return MOON_NOT_AVAILABLE until we grow a
        // real bulk-transport.
        HttpRequest                http                 = 50;
    }

    // Reserved for V2 raw-socket (TCP/UDP) proxy if a real use case
    // emerges — noproto-style SocketConnect/Send/Recv/Close/StateChanged.
    reserved 60 to 69;

    // Historical verbs removed in earlier proto revisions — kept reserved
    // so an old client can't silently mean something new.
    //   40 = open_bulk_channel   41 = close_bulk_channel (L2CAP CoC; not
    //                                supported by our BLE stack variant)
    //   100 = list_app_updates   101 = download_app   110 = check_firmware
    //   200 = http_get           201 = http_post
    reserved 40, 41, 100, 101, 110, 200, 201;
}

message MoonResponse {
    uint32      request_id = 1;
    MoonStatus  status     = 2;

    oneof payload {
        PairResponse            pair              = 3;
        PositionData            position          = 10;
        TimeData                time              = 20;
        NotificationAck         notification      = 30;
        HttpResponse            http              = 50;
        StatusAck               ack               = 255;
    }

    reserved 40;          // previously open_bulk_channel
    reserved 60 to 69;
    reserved 100, 110, 200;
}

// Phone-initiated push. No request_id; phone emits these on its own
// schedule (e.g. once per second for a position subscription, every
// ~30 s for phone_status as an app-level keep-alive).
message MoonEvent {
    oneof event {
        PositionData position_update = 1;
        PhoneStatus  phone_status    = 2;
    }
}

// Top-level message carried over the RPC_RX characteristic. Every
// phone→Flipper notification is a MoonPhoneMessage so the Flipper-side
// decoder only needs one entry point.
message MoonPhoneMessage {
    oneof kind {
        MoonResponse response = 1;
        MoonEvent    event    = 2;
    }
}

// ── Pairing (Phase 1a — trivial, no crypto) ────────────────────────────
//
// Phase 1a: phone accepts any Flipper that sends a PairRequest while the
// user is in its pair-mode window. Phone generates and returns a random
// 16-byte auth_token. Phase 1b will replace this with ECDH + 6-digit code.

message PairRequest {
    string flipper_name = 1;   // purely for the phone's UI
}

message PairResponse {
    bytes  auth_token = 1;     // 16 bytes; caller persists and sends in every MoonRequest
    string phone_name = 2;     // purely for the Flipper's UI
}

// ── Status codes ───────────────────────────────────────────────────────

enum MoonStatus {
    MOON_OK                  = 0;
    MOON_UNAUTHORIZED        = 1;   // auth_token missing or wrong
    MOON_UNSUPPORTED_VERSION = 2;
    MOON_UNSUPPORTED_REQUEST = 3;   // phone doesn't implement this yet
    MOON_INTERNAL_ERROR      = 4;
    MOON_NOT_AVAILABLE       = 5;   // e.g., GPS not fixed, no network, response too big for inline
    MOON_RATE_LIMITED        = 6;
}

// ── Position ───────────────────────────────────────────────────────────

message GetPositionRequest {
    uint32 max_age_ms = 1;   // return cached fix if younger than this; 0 = any age
}

message PositionData {
    sfixed32 lat_e7        = 1;   // latitude  × 1e7
    sfixed32 lon_e7        = 2;   // longitude × 1e7
    sint32   alt_mm        = 3;   // altitude above WGS-84 ellipsoid, mm
    uint32   accuracy_mm   = 4;   // 68 %-CEP horizontal accuracy
    uint32   speed_mmps    = 5;   // speed over ground, mm/s
    uint32   heading_cdeg  = 6;   // 0 – 35999 (0.01 degree)
    uint64   timestamp_ms  = 7;   // Unix epoch ms when the fix was taken
    FixQuality fix_quality = 8;
    uint32   satellites    = 9;
    // Identifier of the upstream source that produced this fix. The paired
    // phone fills this with the first 8 bytes of its stable device ID so
    // the Flipper service can distinguish multiple sources (phone vs. a
    // future Meshtastic bridge vs. a dedicated GPS module) if we ever
    // plumb more than one. Zero-filled when the source doesn't have a
    // stable identity or doesn't care.
    bytes    source_id     = 10;  // 8 bytes, max
}

enum FixQuality {
    FIX_NONE = 0;
    FIX_2D   = 1;
    FIX_3D   = 2;
}

message SubscribePositionRequest {
    uint32 interval_ms = 1;   // push interval; phone may clamp to min 500 ms
}

message UnsubscribePositionRequest {}

// ── Time ───────────────────────────────────────────────────────────────

message GetTimeRequest {}

message TimeData {
    uint64 unix_ms          = 1;
    sint32 tz_offset_seconds = 2;  // e.g., -14400 for EDT
    string tz_name          = 3;   // IANA name, e.g. "America/New_York"
}

// ── Notifications ──────────────────────────────────────────────────────

message SendNotificationRequest {
    string   title    = 1;
    string   body     = 2;
    Priority priority = 3;
    string   tag      = 4;   // optional: phone dedupes by tag, replaces prior with same tag

    enum Priority {
        NORMAL = 0;
        HIGH   = 1;
        URGENT = 2;
    }
}

message NotificationAck {
    bool delivered = 1;
}

// ── Status ─────────────────────────────────────────────────────────────

message StatusAck {}

message PhoneStatus {
    uint32 battery_pct = 1;
    bool   charging    = 2;
    bool   has_network = 3;
}

// ── HTTP proxy ─────────────────────────────────────────────────────────
//
// Any FAP can issue an HTTP(S) request through the paired phone. The
// phone terminates TLS using the system trust store. No per-FAP auth
// gate — the BLE pairing is the trust boundary.
//
// v1 is inline-only: the entire HttpResponse envelope (status + headers +
// body) must fit in a single GATT notification (~244 B usable after
// envelope overhead). Bigger responses come back as MOON_NOT_AVAILABLE.
// When we add GATT-chunked reassembly (or, later, a radio-stack variant
// that supports L2CAP CoC) the proto will grow response fields to carry
// the streamed transport hints.

message HttpRequest {
    string method     = 1;   // GET | POST | PUT | DELETE | PATCH | HEAD
    string url        = 2;   // full URL including scheme (http:// or https://)
    repeated HttpHeader headers = 3;
    bytes  body       = 4;
    uint32 timeout_ms = 5;   // phone enforces; 0 = phone default (30 s)
    reserved 6;              // previously use_bulk (L2CAP CoC hint)
}

message HttpHeader {
    string key   = 1;
    string value = 2;
}

message HttpResponse {
    uint32 status_code = 1;
    repeated HttpHeader headers = 2;
    bytes  body        = 3;
    reserved 4, 5, 6;  // previously bulk_bytes, spsm, session_id (L2CAP CoC)
}
