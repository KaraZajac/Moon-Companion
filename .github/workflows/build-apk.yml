name: Build APK

# Triggers:
#   - Every push to main → build + upload a debug APK as an Actions artifact
#     (downloadable from the Actions tab for 90 days).
#   - Every PR → same, so reviewers can smoke-test the change.
#   - Tag push matching v* → also attach the APK to a GitHub Release.
#   - Manual dispatch for ad-hoc builds from the Actions UI.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release on tag builds

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # GitHub-hosted ubuntu runners ship with Android SDK preinstalled at
      # $ANDROID_HOME. setup-android ensures the exact platform + build-tools
      # we need are present and licenses are accepted.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-34
            build-tools;34.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The wrapper JAR isn't committed (small but binary; keeps the repo
      # text-diffable). Regenerate it here before running ./gradlew.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moon-companion-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          generate_release_notes: true
